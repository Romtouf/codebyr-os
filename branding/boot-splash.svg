<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Fond de menu de démarrage Codebyr OS (rasterisé en splash.png par build.sh) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1318"/>
      <stop offset="1" stop-color="#0E1E27"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.30" r="0.55">
      <stop offset="0" stop-color="#10A5C2" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#10A5C2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#glow)"/>

  <!-- Le Sceau, centré dans le tiers supérieur -->
  <g transform="translate(400,170) scale(1.5) translate(-50,-50)" fill="none" stroke-width="13" stroke-linecap="round">
    <path d="M 84.64 70 A 40 40 0 0 1 19.36 75.71" stroke="#2FB9D4"/>
    <path d="M 13.75 66.91 A 40 40 0 0 1 36.32 12.42" stroke="#2FB9D4"/>
    <path d="M 46.51 10.15 A 40 40 0 0 1 84.64 30" stroke="#2FB9D4"/>
  </g>
  <circle cx="400" cy="170" r="14" fill="#43C7DF"/>

  <!-- Wordmark -->
  <text x="400" y="290" text-anchor="middle" font-family="DejaVu Sans, sans-serif"
        font-size="52" font-weight="bold" letter-spacing="-1" fill="#E7EEF1">codebyr<tspan fill="#43C7DF"> OS</tspan></text>
  <text x="400" y="322" text-anchor="middle" font-family="DejaVu Sans, sans-serif"
        font-size="16" letter-spacing="3" fill="#6E8A97">SÉCURISÉ PAR CONCEPTION · SIMPLE PAR CONVICTION</text>
</svg>
