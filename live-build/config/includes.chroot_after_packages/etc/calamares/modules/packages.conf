# Module « packages » — version Codebyr OS.
# Identique au fichier officiel, avec en plus le retrait de calamares lui-même :
# une fois Codebyr OS installé, l'installeur n'a plus rien à faire sur le
# système (le lanceur « Installer Codebyr OS » disparaît avec lui via TryExec).
backend: apt

operations:
  - remove:
      - 'live-boot'
      - 'live-boot-doc'
      - 'live-config'
      - 'live-config-doc'
      - 'live-config-systemd'
      - 'live-tools'
      - 'live-task-localisation'
      - 'live-task-recommended'
      - 'calamares-settings-debian'
      - 'calamares'
