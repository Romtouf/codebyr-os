# Module « users » de Calamares — version Codebyr OS.
# Basé sur le fichier officiel de calamares-settings-debian, avec en plus :
#  - allowWeakPasswords : l'utilisateur peut assumer un mot de passe faible
#    (case à cocher), au lieu d'être bloqué net par le contrôle de qualité.
---
userGroup:       users
defaultGroups:
    - cdrom
    - floppy
    - sudo
    - audio
    - dip
    - video
    - plugdev
    - netdev
    - lpadmin
    - scanner
    - bluetooth
autologinGroup:  autologin
sudoersGroup:    sudo
setRootPassword: false

allowWeakPasswords: true
allowWeakPasswordsDefault: false

passwordRequirements:
    nonempty: true
    minLength: -1
    maxLength: -1
    libpwquality:
        - minlen=0
        - minclass=0
