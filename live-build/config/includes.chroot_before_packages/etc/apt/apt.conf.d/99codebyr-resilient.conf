// Codebyr OS — APT résilient pendant la construction.
// Le réseau de build reset par intermittence sur les gros paquets ;
// on réessaie beaucoup et on télécharge en série (une connexion à la fois)
// pour éviter la boucle « Tried to start delayed item ... but failed ».
Acquire::Retries "20";
Acquire::Queue-Mode "access";
Acquire::http::Pipeline-Depth "0";
Acquire::http::Timeout "120";
Acquire::https::Timeout "120";
Acquire::ftp::Timeout "120";
