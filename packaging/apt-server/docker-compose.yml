# Codebyr OS — serveur du dépôt APT (apt.codebyr.dev)
#
# Sert le répertoire apt-repo/ (généré par publish-apt.sh) en HTTP interne.
# Nginx Proxy Manager fait le TLS par-dessus, comme pour le site.
# Le dépôt est monté en VOLUME : on met à jour par un simple rsync, sans
# reconstruire d'image.
#
#   1) rsync -a --delete .../packaging/apt-repo/  ./apt-repo/
#   2) docker compose up -d
#
services:
  codebyr-apt:
    image: nginx:1.27-alpine
    container_name: codebyr-apt
    restart: unless-stopped
    volumes:
      - ./apt-repo:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy
    labels:
      - "autoheal=true"
    healthcheck:
      # 127.0.0.1 (et non localhost) : voir le correctif IPv6 du site.
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/InRelease || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  proxy:
    external: true
    name: nginx-proxy-manager_default
