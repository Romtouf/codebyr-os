# Codebyr OS — nginx servant le dépôt APT (dépôt « flat »).
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    server_tokens off;
    autoindex off;

    # Types corrects pour qu'apt et les navigateurs traitent bien les fichiers.
    types {
        text/plain                          Packages Release InRelease;
        application/gzip                    gz;
        application/vnd.debian.binary-package deb;
        application/pgp-signature           gpg;
    }
    default_type application/octet-stream;

    # Les index APT ne doivent jamais être servis depuis un cache périmé.
    location ~* /(InRelease|Release(\.gpg)?|Packages(\.gz)?)$ {
        expires -1;
        add_header Cache-Control "no-store";
    }
    # Les .deb sont immuables (versionnés) : cache long.
    location ~* \.deb$ {
        expires 30d;
    }

    location / {
        try_files $uri =404;
    }
}
