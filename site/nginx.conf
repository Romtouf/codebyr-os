# Codebyr OS — configuration nginx du site vitrine.
# Le TLS, HTTP/2 et HSTS sont gérés en amont par Nginx Proxy Manager :
# ce conteneur ne sert que du HTTP en interne, sur le réseau Docker.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    charset utf-8;

    # ── Compression ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── En-têtes de sécurité ────────────────────────────────────
    # ATTENTION (piège nginx) : une directive add_header dans un bloc
    # « location » ANNULE toutes celles héritées du niveau supérieur.
    # C'est pourquoi les blocs location ci-dessous n'utilisent QUE la
    # directive « expires » (qui, elle, n'écrase pas les add_header).
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-Frame-Options          "DENY" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=(), payment=()" always;
    # CSP verrouillée : les polices étant auto-hébergées, le site ne contacte
    # AUCUNE origine tierce. Tout ce qui n'est pas 'self' est interdit.
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; connect-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; object-src 'none'" always;

    # ── Cache ───────────────────────────────────────────────────
    # Le HTML n'est jamais mis en cache (déploiements immédiats) ;
    # les images et polices le sont longuement.
    location = / {
        expires -1;
    }
    location = /index.html {
        expires -1;
    }
    location ~* \.(css|js)$ {
        expires 7d;
    }
    location ~* \.(png|jpe?g|gif|svg|webp|ico|woff2?)$ {
        expires 30d;
    }

    # Fichiers absents → page d'accueil (site à page unique)
    error_page 404 =200 /index.html;
}
